---
- name: Configure web server
  hosts: webservers
  become: true

  vars:
    azure_region: "westus"

  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Allow HTTP through UFW
      ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS through UFW
      ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Deploy web app landing page
      template:
        src: ../templates/index.html.j2
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: "0644"

    - name: Ensure nginx is started and enabled
      systemd:
        name: nginx
        state: started
        enabled: true
